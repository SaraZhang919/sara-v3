<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sara V3 — Search Intent & Page Type Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #faf7f2;
  padding: 40px;
}
.card {
  max-width: 640px;
  margin: auto;
  background: #fff;
  padding: 32px;
  border-radius: 12px;
}
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
}
button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #c4622d;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.msg {
  margin-top: 16px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Sara V3</h2>

  <!-- 🔐 Access Key -->
  <input 
    type="password" 
    id="authInput" 
    placeholder="Enter Access Key (required)" 
  />

  <!-- Email -->
  <input 
    type="email" 
    id="emailInput" 
    placeholder="you@company.com" 
  />

  <!-- URLs -->
  <textarea 
    id="urlBatch" 
    placeholder="Paste competitor URLs (one per line)"
  ></textarea>

  <button onclick="handleSubmit()">Analyse My Competitors</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const WEBHOOK = 'https://tizianazhang.app.n8n.cloud/webhook/sara_v3';

// n8n header 名称
const AUTH_HEADER_NAME = 'Sara';

function parseUrls(text) {
  return [...new Set(
    text.split(/[\s,]+/)
      .map(s => s.trim())
      .filter(s => /^https?:\/\//i.test(s))
  )];
}

function showMsg(text, isError = false) {
  const el = document.getElementById('msg');
  el.innerText = text;
  el.style.color = isError ? '#dc2626' : '#16a34a';
}

async function handleSubmit() {
  showMsg('');

  const authValue = document.getElementById('authInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const urls = parseUrls(document.getElementById('urlBatch').value).slice(0, 12);

  // 🔐 校验 Access Key
  if (!authValue) {
    showMsg('Please enter your Access Key.', true);
    return;
  }

  // Email 校验
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showMsg('Please enter a valid email.', true);
    return;
  }

  // URL 校验
  if (urls.length === 0) {
    showMsg('Please input at least one valid URL (https://...)', true);
    return;
  }

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',

        // ✅ 用户输入的 auth
        [AUTH_HEADER_NAME]: authValue
      },
      body: JSON.stringify({
        email,
        chatInput: urls.join('\n')
      })
    });

    const text = await res.text();
    console.log('DEBUG:', res.status, text);

    if (!res.ok) {
      if (res.status === 403) {
        throw new Error('Invalid Access Key.');
      }
      throw new Error(text || 'Server error');
    }

    showMsg('✅ Submitted! Please check your email.');

  } catch (err) {
    showMsg('❌ ' + err.message, true);
  }
}
</script>

</body>
</html>
